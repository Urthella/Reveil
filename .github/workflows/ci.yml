name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (NestJS, SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --runInBand
      - run: npm run test:e2e -- --runInBand

  postgres-e2e:
    name: Backend e2e (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reveil
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DB_DRIVER: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: reveil
      DB_SYNC: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Migration smoke (idempotent run)
        env:
          DB_SYNC: 'false'
        run: |
          npm run migration:run
          npm run migration:run
      - name: Reset DB before e2e
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "DROP DATABASE IF EXISTS reveil_e2e;"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE reveil_e2e;"
      - name: Run e2e against Postgres
        env:
          DB_NAME: reveil_e2e
        run: npm run test:e2e -- --runInBand

  ai_engine:
    name: AI Engine (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai_engine/requirements.txt
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m pytest -q

  mobile:
    name: Mobile (Expo / TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm test -- --watchAll=false --passWithNoTests
